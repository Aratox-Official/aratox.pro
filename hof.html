<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hall of Memes</title>
  <link rel="shortcut icon" type="image/x-icon" href="https://yt3.googleusercontent.com/RvY94TcGMj_BaaQtOJzrWjONB9G8fzDLD6zLaynVFrHruhqeDmIWUqziflCjCkZMhKg8Xshw=s160-c-k-c0x00ffffff-no-rj"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #161618;
      color: #b0b0b0;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.7;
      padding: 4rem 1.5rem 6rem;
    }

    .wrap {
      max-width: 640px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 3rem;
      padding-bottom: 2.5rem;
      border-bottom: 1px solid #242428;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #f0f0f0;
      line-height: 1.2;
    }

    .back-link {
      display: inline-block;
      font-size: 0.82rem;
      color: #888;
      text-decoration: none;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.2rem 0.6rem;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .back-link:hover { color: #ccc; border-color: #666; }

    section { margin-bottom: 2.8rem; }

    h2 {
      font-size: 0.72rem;
      font-weight: 600;
      color: #505050;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 1rem;
    }

    .meme-img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 6px;
      border: 1px solid #2a2a30;
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>Hall of Memes</h1>
    <a class="back-link" href="index.html">← Back</a>
  </div>

  <section>
    <h2>Featured</h2>
    <img
      class="meme-img"
      src="Images/Screenshot 2025-09-14 190323.png"
      alt="That Feeling When Knee Surgery Is Tomorrow Meme"
    />
  </section>

</div>
</body>
</html>
