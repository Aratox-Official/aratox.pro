<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>very rizzy page, right?</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #response { 
            margin-top: 15px; 
            padding: 15px; 
            background: #fdfdfd; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            white-space: pre-wrap;
            font-family: monospace;
        }
        .status { font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <h2>Automatic Worker Request</h2>
    <div class="status">Status: <span id="status">Initializing...</span></div>
    
    <div id="response">Waiting for response...</div>

    <script>
        // Function to perform the request
        async function makeAutoRequest() {
            const statusEl = document.getElementById('status');
            const responseEl = document.getElementById('response');
            
            statusEl.textContent = 'Requesting data...';

            try {
                const response = await fetch('https://small-darkness-a354.aratox-business.workers.dev/');
                
                if (!response.ok) {
                    throw new Error(`Server responded with ${response.status}`);
                }

                const contentType = response.headers.get("content-type");
                let data;

                if (contentType && contentType.includes("application/json")) {
                    const json = await response.json();
                    data = JSON.stringify(json, null, 2);
                } else {
                    data = await response.text();
                }

                statusEl.textContent = 'Success!';
                statusEl.style.color = 'green';
                responseEl.textContent = data;

            } catch (error) {
                statusEl.textContent = 'Failed';
                statusEl.style.color = 'red';
                responseEl.textContent = 'Error: ' + error.message;
                console.error('Auto-fetch failed:', error);
            }
        }

        makeAutoRequest();
    </script>

</body>
</html>
